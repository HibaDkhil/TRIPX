<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accommodations Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    #map {
      position: relative;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    // JavaFX WebView workaround: disable Leaflet 3D transform path.
    if (L.Browser) {
      L.Browser.any3d = false;
      L.Browser.webkit3d = false;
    }

    const map = L.map("map", {
      zoomControl: true,
      zoomAnimation: false,
      fadeAnimation: false,
      markerZoomAnimation: false,
      inertia: false,
      preferCanvas: true
    }).setView([36.8065, 10.1815], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      subdomains: ["a", "b", "c"],
      detectRetina: false,
      updateWhenIdle: true,
      updateWhenZooming: false,
      keepBuffer: 2,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);

    function clearMarkers() {
      markersLayer.clearLayers();
    }

    function addMarker(item) {
      if (!item || item.latitude == null || item.longitude == null) return;

      const marker = L.marker([item.latitude, item.longitude]).addTo(markersLayer);
      const title = item.name || "Accommodation";
      const location = [item.city, item.country].filter(Boolean).join(", ");
      marker.bindPopup("<b>" + title + "</b><br/>" + location);

      marker.on("click", function () {
        if (window.javaBridge && typeof window.javaBridge.onMarkerClicked === "function") {
          window.javaBridge.onMarkerClicked(String(item.id));
        }
      });
    }

    function setMarkers(items) {
      clearMarkers();
      if (!Array.isArray(items)) return;

      const bounds = [];
      items.forEach(function (item) {
        if (item && item.latitude != null && item.longitude != null) {
          addMarker(item);
          bounds.push([item.latitude, item.longitude]);
        }
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [24, 24] });
      }
      invalidateMapSize();
    }

    function invalidateMapSize() {
      setTimeout(function () {
        map.invalidateSize(true);
      }, 50);
      setTimeout(function () {
        map.invalidateSize(true);
      }, 180);
      setTimeout(function () {
        map.invalidateSize(true);
      }, 420);
    }

    window.setMarkers = setMarkers;
    window.clearMarkers = clearMarkers;
    window.invalidateMapSize = invalidateMapSize;
    invalidateMapSize();
  </script>
</body>
</html>
